<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Send Txt..</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #eaeff1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .hidden { display: none !important; }

    /* Login */
    #loginScreen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; }
    #loginScreen input { padding: 10px; font-size: 16px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc; width: 240px; }
    #loginScreen button { padding: 10px 20px; font-size: 15px; background: #007bff; border: none; color: white; border-radius: 5px; cursor: pointer; }

    /* Chat */
    #chatUI { display: flex; flex-direction: column; height: 100%; }
    .chat-box { flex: 1; overflow-y: auto; padding: 15px; background: #f8f9fa; display: flex; flex-direction: column; }
    
    .message { 
      position: relative; 
      padding: 10px 14px; 
      margin: 10px 0; 
      border-radius: 10px; 
      max-width: 75%; 
      word-wrap: break-word; 
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .sent { align-self: flex-end; background: #cce5ff; }
    .received { align-self: flex-start; background: #dee2e6; }
    
    .del-btn { 
      color: #dc3545; 
      cursor: pointer; 
      font-size: 14px; 
      opacity: 0.6; 
      transition: opacity 0.2s;
    }
    .del-btn:hover { opacity: 1; }

    .input-container { display: flex; align-items: center; padding: 12px 15px; background: #fff; border-top: 1px solid #ccc; }
    .input-container textarea { flex: 1; resize: none; padding: 12px 16px; font-size: 15px; border: 1px solid #ccc; border-radius: 25px; outline: none; height: 44px; }
    .send-btn { background: #007bff; border: none; color: white; margin-left: 10px; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
    
    #logoutBtn { background:#555; color: white; border: none; padding: 10px 16px; margin-left: 10px; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>

  <div id="loginScreen" class="hidden">
    <h2>Login to Continue</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button id="loginBtn">Login</button>
  </div>

  <div id="chatUI" class="hidden">
    <div class="chat-box" id="chatBox"></div>
    <div class="input-container">
      <textarea id="messageInput" placeholder="Type a message..."></textarea>
      <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBxbzsSi-dsFPPGDeogz2SaEsW_3OKu-QU",
    authDomain: "striped-acrobat-342207.firebaseapp.com",
    databaseURL: "https://striped-acrobat-342207-default-rtdb.firebaseio.com",
    projectId: "striped-acrobat-342207",
    storageBucket: "striped-acrobat-342207.appspot.com",
    messagingSenderId: "367114842706",
    appId: "1:367114842706:web:0f6d504163ed3c72ed658b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const chatBox = document.getElementById("chatBox");

  // Local Storage Cache logic
  function saveCache(messages) { localStorage.setItem("chatCache", JSON.stringify(messages)); }
  function loadCache() {
    const data = localStorage.getItem("chatCache");
    return data ? JSON.parse(data) : [];
  }

  // Render Function
  function renderMessages(messagesObj, currentUser) {
    chatBox.innerHTML = "";
    // We iterate over keys to get the ID for deletion
    Object.keys(messagesObj).forEach(key => {
      const msg = messagesObj[key];
      const div = document.createElement("div");
      div.classList.add("message", msg.uid === currentUser ? "sent" : "received");
      
      const textSpan = document.createElement("span");
      textSpan.textContent = msg.text;
      
      const deleteIcon = document.createElement("i");
      deleteIcon.className = "fas fa-trash del-btn";
      deleteIcon.onclick = () => deleteSingleMessage(key);

      div.appendChild(textSpan);
      // Only allow user to delete their own messages (optional logic)
      if (msg.uid === currentUser) {
        div.appendChild(deleteIcon);
      }

      chatBox.appendChild(div);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // Delete specific message
  function deleteSingleMessage(msgId) {
    if (confirm("Delete this message?")) {
      remove(ref(db, `messages/${msgId}`));
    }
  }

  // Auth & UI logic
  document.getElementById("loginBtn").onclick = () => {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    signInWithEmailAndPassword(auth, email, password).catch(err => alert(err.message));
  };

  document.getElementById("logoutBtn").onclick = () => {
    signOut(auth);
    localStorage.removeItem("chatCache");
    location.reload(); 
  };

  function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (!text) return;
    push(ref(db, "messages"), { 
      text, 
      uid: auth.currentUser.uid, 
      timestamp: Date.now() 
    });
    input.value = "";
  }

  document.getElementById("sendBtn").onclick = sendMessage;
  document.getElementById("messageInput").onkeydown = (e) => {
    if (e.key === "Enter" && !e.ctrlKey) { e.preventDefault(); sendMessage(); }
  };

  // Sync with Firebase
  function loadMessages() {
    onValue(ref(db, "messages"), snapshot => {
      const data = snapshot.val() || {};
      saveCache(data);
      renderMessages(data, auth.currentUser?.uid);
    });
  }

  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("chatUI").classList.remove("hidden");
      loadMessages();
    } else {
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("chatUI").classList.add("hidden");
    }
  });
</script>
</body>
</html>
