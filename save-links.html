<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBxbzsSi-dsFPPGDeogz2SaEsW_3OKu-QU",
    authDomain: "striped-acrobat-342207.firebaseapp.com",
    databaseURL: "https://striped-acrobat-342207-default-rtdb.firebaseio.com",
    projectId: "striped-acrobat-342207",
    storageBucket: "striped-acrobat-342207.appspot.com",
    messagingSenderId: "367114842706",
    appId: "1:367114842706:web:0f6d504163ed3c72ed658b"
  };

  const firebaseApp = initializeApp(firebaseConfig);
  const firebaseAuth = getAuth(firebaseApp);
  const database = getDatabase(firebaseApp);
  const chatBox = document.getElementById("chatBox");

  const saveToCache = (msgs) => localStorage.setItem("chat_backup", JSON.stringify(msgs));
  const getFromCache = () => JSON.parse(localStorage.getItem("chat_backup") || "[]");

  // Helper function to identify and format links
  function formatText(text) {
    const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
    return text.replace(urlPattern, (url) => {
      return `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: underline;">${url}</a>`;
    });
  }

  function renderMessages(messages, currentUid) {
    chatBox.innerHTML = "";
    messages.forEach(msg => {
      const msgDiv = document.createElement("div");
      msgDiv.classList.add("message", msg.uid === currentUid ? "sent" : "received");
      
      // Use innerHTML instead of textContent to allow the link tags to work
      msgDiv.innerHTML = formatText(msg.text);
      
      chatBox.appendChild(msgDiv);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  renderMessages(getFromCache(), null);

  onAuthStateChanged(firebaseAuth, (user) => {
    const loginUI = document.getElementById("loginScreen");
    const chatUI = document.getElementById("chatUI");
    if (user && user.emailVerified) {
      loginUI.classList.add("hidden");
      chatUI.classList.remove("hidden");
      startSync();
    } else {
      loginUI.classList.remove("hidden");
      chatUI.classList.add("hidden");
    }
  });

  function startSync() {
    onValue(ref(database, "messages"), (snapshot) => {
      const data = snapshot.val() || {};
      const messages = Object.values(data);
      saveToCache(messages);
      renderMessages(messages, firebaseAuth.currentUser?.uid);
    });
  }

  const handleSend = () => {
    const input = document.getElementById("messageInput");
    const val = input.value.trim();
    if (val && firebaseAuth.currentUser) {
      push(ref(database, "messages"), {
        text: val,
        uid: firebaseAuth.currentUser.uid,
        timestamp: Date.now()
      });
      input.value = "";
    }
  };

  document.getElementById("loginBtn").onclick = () => {
    const email = document.getElementById("loginEmail").value;
    const pass = document.getElementById("loginPassword").value;
    signInWithEmailAndPassword(firebaseAuth, email, pass).catch(e => alert(e.message));
  };

  document.getElementById("logoutBtn").onclick = () => {
    signOut(firebaseAuth).then(() => {
        localStorage.removeItem("chat_backup");
        location.reload(); 
    });
  };

  document.getElementById("sendBtn").onclick = handleSend;
  
  document.getElementById("messageInput").onkeydown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  };

  document.getElementById("clearBtn").onclick = () => {
    if (confirm("Delete all saved links?")) {
      remove(ref(database, "messages"));
    }
  };
</script>
