<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Link Vault Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .hidden { display: none !important; }

    /* Login Screen */
    #loginScreen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #ffffff; }
    #loginScreen h2 { color: #1c1e21; margin-bottom: 20px; font-weight: 600; }
    #loginScreen input { padding: 14px; font-size: 16px; margin: 8px 0; border-radius: 8px; border: 1px solid #dddfe2; width: 280px; outline: none; }
    #loginScreen button { padding: 12px 24px; font-size: 16px; background: #007bff; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; width: 308px; }
    #loginScreen button:hover { background: #0056b3; }

    /* Chat Interface */
    #chatUI { display: flex; flex-direction: column; height: 100%; }
    .chat-box { flex: 1; overflow-y: auto; padding: 20px; background: #ffffff; display: flex; flex-direction: column; gap: 12px; }
    
    .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-wrap: break-word; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .sent { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 4px; }
    .received { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 4px; }
    
    /* Link appearance */
    .message a { color: inherit; text-decoration: underline; font-weight: 500; transition: opacity 0.2s; }
    .message a:hover { opacity: 0.8; }

    /* Input Area */
    .input-container { display: flex; align-items: center; padding: 15px; background: #fff; border-top: 1px solid #ddd; gap: 10px; }
    .input-container textarea { flex: 1; resize: none; padding: 12px; font-size: 15px; border: 1px solid #ccd0d5; border-radius: 20px; outline: none; height: 40px; }
    .send-btn { background: #007bff; border: none; color: white; border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; flex-shrink: 0; }
    
    .action-btn { background: #606770; color: white; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .clear-btn { background: #fa3e3e; }
  </style>
</head>
<body>

  <div id="loginScreen">
    <h2>Link Vault</h2>
    <input type="email" id="loginEmail" placeholder="Email Address">
    <input type="password" id="loginPassword" placeholder="Password">
    <button id="loginBtn">Sign In</button>
  </div>

  <div id="chatUI" class="hidden">
    <div class="chat-box" id="chatBox"></div>
    <div class="input-container">
      <textarea id="messageInput" placeholder="Paste link here..."></textarea>
      <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
      <button class="action-btn clear-btn" id="clearBtn">Clear</button>
      <button class="action-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBxbzsSi-dsFPPGDeogz2SaEsW_3OKu-QU",
    authDomain: "striped-acrobat-342207.firebaseapp.com",
    databaseURL: "https://striped-acrobat-342207-default-rtdb.firebaseio.com",
    projectId: "striped-acrobat-342207",
    storageBucket: "striped-acrobat-342207.appspot.com",
    messagingSenderId: "367114842706",
    appId: "1:367114842706:web:0f6d504163ed3c72ed658b"
  };

  const firebaseApp = initializeApp(firebaseConfig);
  const firebaseAuth = getAuth(firebaseApp);
  const database = getDatabase(firebaseApp);

  // STORAGE DATA STRING: Using "user_links" instead of "messages"
  const STORAGE_PATH = "user_links";

  // Logic to find links and wrap them in clickable <a> tags
  function linkify(text) {
    const urlPattern = /(\b(https?|ftp):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
    const pseudoUrlPattern = /(^|[^\/])(www\.[\S]+(\b|$))/gim;

    return text
      .replace(urlPattern, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>')
      .replace(pseudoUrlPattern, '$1<a href="http://$2" target="_blank" rel="noopener noreferrer">$2</a>');
  }

  function renderMessages(messages, currentUid) {
    const chatBox = document.getElementById("chatBox");
    if (!chatBox) return;

    chatBox.innerHTML = "";
    messages.forEach(msg => {
      const msgDiv = document.createElement("div");
      msgDiv.classList.add("message", msg.uid === currentUid ? "sent" : "received");
      msgDiv.innerHTML = linkify(msg.text);
      chatBox.appendChild(msgDiv);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  window.addEventListener('DOMContentLoaded', () => {
    const saveToCache = (msgs) => localStorage.setItem("link_backup", JSON.stringify(msgs));
    const getFromCache = () => JSON.parse(localStorage.getItem("link_backup") || "[]");

    renderMessages(getFromCache(), null);

    onAuthStateChanged(firebaseAuth, (user) => {
      const loginUI = document.getElementById("loginScreen");
      const chatUI = document.getElementById("chatUI");

      if (user) {
        loginUI.classList.add("hidden");
        chatUI.classList.remove("hidden");
        
        // Listen to the new STORAGE_PATH
        onValue(ref(database, STORAGE_PATH), (snapshot) => {
          const data = snapshot.val() || {};
          const messages = Object.values(data);
          saveToCache(messages);
          renderMessages(messages, firebaseAuth.currentUser?.uid);
        });
      } else {
        loginUI.classList.remove("hidden");
        chatUI.classList.add("hidden");
      }
    });

    const handleSend = () => {
      const input = document.getElementById("messageInput");
      const val = input.value.trim();
      if (val && firebaseAuth.currentUser) {
        // Push to new STORAGE_PATH
        push(ref(database, STORAGE_PATH), {
          text: val,
          uid: firebaseAuth.currentUser.uid,
          timestamp: Date.now()
        });
        input.value = "";
      }
    };

    document.getElementById("sendBtn").onclick = handleSend;
    document.getElementById("messageInput").onkeydown = (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    };

    document.getElementById("loginBtn").onclick = () => {
      const email = document.getElementById("loginEmail").value;
      const pass = document.getElementById("loginPassword").value;
      signInWithEmailAndPassword(firebaseAuth, email, pass).catch(err => alert(err.message));
    };

    document.getElementById("logoutBtn").onclick = () => {
      signOut(firebaseAuth).then(() => {
        localStorage.removeItem("link_backup");
        location.reload();
      });
    };

    document.getElementById("clearBtn").onclick = () => {
      if (confirm("Clear all data in " + STORAGE_PATH + "?")) {
        remove(ref(database, STORAGE_PATH));
      }
    };
  });
</script>
</body>
</html>
