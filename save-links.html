<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Send Txt..</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css" />
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #eaeff1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .hidden { display: none !important; }

    /* Login */
    #loginScreen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; transition: opacity 0.3s ease; }
    #loginScreen input { padding: 10px; font-size: 16px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc; width: 240px; }
    #loginScreen button { padding: 10px 20px; font-size: 15px; background: #007bff; border: none; color: white; border-radius: 5px; cursor: pointer; }
    #loginScreen button:hover { background: #0056b3; }

    /* Chat */
    #chatUI { display: flex; flex-direction: column; height: 100%; }
    .chat-box { flex: 1; overflow-y: auto; padding: 15px; background: #f8f9fa; scroll-behavior: smooth; display: flex; flex-direction: column; }
    .message { position: relative; padding: 10px 14px; margin: 10px 0; border-radius: 10px; max-width: 75%; word-wrap: break-word; }
    .sent { align-self: flex-end; background: #cce5ff; border-bottom-right-radius: 2px; }
    .received { align-self: flex-start; background: #dee2e6; border-bottom-left-radius: 2px; }

    .input-container { display: flex; align-items: center; padding: 12px 15px; background: #fff; border-top: 1px solid #ccc; }
    .input-container textarea { flex: 1; resize: none; padding: 12px 16px; font-size: 15px; border: 1px solid #ccc; border-radius: 25px; outline: none; height: 44px; }
    .send-btn { background: #007bff; border: none; color: white; margin-left: 10px; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
    .send-btn:hover { background: #0056b3; }
    .clear-all { background: #dc3545; color: #fff; border: none; padding: 10px 16px; margin-left: 10px; font-size: 14px; border-radius: 5px; cursor: pointer; }
    .clear-all:hover { background: #a71d2a; }
    #logoutBtn { background:#555; }
  </style>
</head>
<body>

  <div id="loginScreen">
    <h2>Login to Continue</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button id="loginBtn">Login</button>
    <br>
    <small>Only verified accounts can access.</small>
  </div>

  <div id="chatUI" class="hidden">
    <div class="chat-box" id="chatBox"></div>
    <div class="input-container">
      <textarea id="messageInput" placeholder="Type a message..."></textarea>
      <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
      <button class="clear-all" id="clearBtn">Clear</button>
      <button id="logoutBtn" class="clear-all">Logout</button>
    </div>
  </div>

<script type="module">
  // Updated Firebase SDK Links (v11.x)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

  // --- REPLACE THE STRINGS BELOW WITH YOUR NEW FIREBASE PROJECT DATA ---
  const firebaseConfig = {
    apiKey: "YOUR_NEW_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const chatBox = document.getElementById("chatBox");

  // Cache Logic
  const saveCache = (messages) => localStorage.setItem("chatCache", JSON.stringify(messages));
  const loadCache = () => JSON.parse(localStorage.getItem("chatCache") || "[]");

  function renderMessages(messages, currentUserUid) {
    chatBox.innerHTML = "";
    messages.forEach(msg => {
      const div = document.createElement("div");
      div.classList.add("message", msg.uid === currentUserUid ? "sent" : "received");
      div.textContent = msg.text;
      chatBox.appendChild(div);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // Pre-load from Cache
  const cached = loadCache();
  if (cached.length > 0) {
    renderMessages(cached, null); 
  }

  // Auth & UI Toggle
  onAuthStateChanged(auth, (user) => {
    const loginScreen = document.getElementById("loginScreen");
    const chatUI = document.getElementById("chatUI");

    if (user && user.emailVerified) {
      loginScreen.classList.add("hidden");
      chatUI.classList.remove("hidden");
      loadMessages();
    } else {
      loginScreen.classList.remove("hidden");
      chatUI.classList.add("hidden");
    }
  });

  // Database listener
  function loadMessages() {
    onValue(ref(db, "messages"), (snapshot) => {
      const data = snapshot.val() || {};
      const messages = Object.values(data);
      saveCache(messages);
      renderMessages(messages, auth.currentUser?.uid);
    });
  }

  // Actions
  const sendMessage = () => {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (text && auth.currentUser) {
      push(ref(db, "messages"), { 
        text, 
        uid: auth.currentUser.uid, 
        timestamp: Date.now() 
      });
      input.value = "";
    }
  };

  document.getElementById("loginBtn").onclick = () => {
    const email = document.getElementById("loginEmail").value;
    const pass = document.getElementById("loginPassword").value;
    signInWithEmailAndPassword(auth, email, pass).catch(err => alert(err.message));
  };

  document.getElementById("logoutBtn").onclick = () => {
    signOut(auth);
    localStorage.removeItem("chatCache");
  };

  document.getElementById("sendBtn").onclick = sendMessage;
  document.getElementById("clearBtn").onclick = () => {
    if (confirm("Clear all messages?")) {
      remove(ref(db, "messages"));
      saveCache([]);
    }
  };
</script>
</body>
</html>
