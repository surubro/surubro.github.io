<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Link Saver</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eaeff1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .hidden { display: none !important; }

    /* Login Screen */
    #loginScreen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #ffffff; }
    #loginScreen h2 { color: #333; margin-bottom: 20px; }
    #loginScreen input { padding: 12px; font-size: 16px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; width: 260px; outline: none; }
    #loginScreen button { padding: 12px 24px; font-size: 16px; background: #007bff; border: none; color: white; border-radius: 8px; cursor: pointer; transition: 0.2s; }
    #loginScreen button:hover { background: #0056b3; }

    /* Chat Interface */
    #chatUI { display: flex; flex-direction: column; height: 100%; }
    .chat-box { flex: 1; overflow-y: auto; padding: 20px; background: #fdfdfd; display: flex; flex-direction: column; gap: 10px; }
    
    .message { max-width: 75%; padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.4; word-wrap: break-word; position: relative; }
    .sent { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
    .received { align-self: flex-start; background: #e9ecef; color: #333; border-bottom-left-radius: 2px; }
    
    /* Link Styling */
    .message a { color: #fff; text-decoration: underline; font-weight: bold; }
    .received a { color: #007bff; }

    /* Input Area */
    .input-container { display: flex; align-items: center; padding: 15px; background: #fff; border-top: 1px solid #eee; gap: 10px; }
    .input-container textarea { flex: 1; resize: none; padding: 12px; font-size: 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; height: 45px; }
    .send-btn { background: #007bff; border: none; color: white; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; flex-shrink: 0; }
    .send-btn:hover { background: #0056b3; }
    
    .action-btn { background: #6c757d; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .clear-btn { background: #dc3545; }
  </style>
</head>
<body>

  <div id="loginScreen">
    <h2>Link Vault</h2>
    <input type="email" id="loginEmail" placeholder="Email Address">
    <input type="password" id="loginPassword" placeholder="Password">
    <button id="loginBtn">Sign In</button>
  </div>

  <div id="chatUI" class="hidden">
    <div class="chat-box" id="chatBox"></div>
    <div class="input-container">
      <textarea id="messageInput" placeholder="Paste a link here..."></textarea>
      <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
      <button class="action-btn clear-btn" id="clearBtn">Clear All</button>
      <button class="action-btn" id="logoutBtn">Logout</button>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBxbzsSi-dsFPPGDeogz2SaEsW_3OKu-QU",
    authDomain: "striped-acrobat-342207.firebaseapp.com",
    databaseURL: "https://striped-acrobat-342207-default-rtdb.firebaseio.com",
    projectId: "striped-acrobat-342207",
    storageBucket: "striped-acrobat-342207.appspot.com",
    messagingSenderId: "367114842706",
    appId: "1:367114842706:web:0f6d504163ed3c72ed658b"
  };

  const firebaseApp = initializeApp(firebaseConfig);
  const firebaseAuth = getAuth(firebaseApp);
  const database = getDatabase(firebaseApp);

  // Helper: Regex to find links and wrap them in <a> tags
  function linkify(text) {
    const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
    return text.replace(urlPattern, (url) => {
      return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    });
  }

  function renderMessages(messages, currentUid) {
    const chatBox = document.getElementById("chatBox");
    if (!chatBox) return;

    chatBox.innerHTML = "";
    messages.forEach(msg => {
      const msgDiv = document.createElement("div");
      msgDiv.classList.add("message", msg.uid === currentUid ? "sent" : "received");
      // Use innerHTML to render the linkify'd tags
      msgDiv.innerHTML = linkify(msg.text);
      chatBox.appendChild(msgDiv);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // Auth & Sync Logic
  window.addEventListener('DOMContentLoaded', () => {
    const saveToCache = (msgs) => localStorage.setItem("chat_backup", JSON.stringify(msgs));
    const getFromCache = () => JSON.parse(localStorage.getItem("chat_backup") || "[]");

    // Load from cache immediately
    renderMessages(getFromCache(), null);

    onAuthStateChanged(firebaseAuth, (user) => {
      const loginUI = document.getElementById("loginScreen");
      const chatUI = document.getElementById("chatUI");

      if (user) {
        loginUI.classList.add("hidden");
        chatUI.classList.remove("hidden");
        
        // Real-time listener
        onValue(ref(database, "messages"), (snapshot) => {
          const data = snapshot.val() || {};
          const messages = Object.values(data);
          saveToCache(messages);
          renderMessages(messages, firebaseAuth.currentUser?.uid);
        });
      } else {
        loginUI.classList.remove("hidden");
        chatUI.classList.add("hidden");
      }
    });

    // Handle Sending
    const handleSend = () => {
      const input = document.getElementById("messageInput");
      const val = input.value.trim();
      if (val && firebaseAuth.currentUser) {
        push(ref(database, "messages"), {
          text: val,
          uid: firebaseAuth.currentUser.uid,
          timestamp: Date.now()
        });
        input.value = "";
      }
    };

    // Event Listeners
    document.getElementById("sendBtn").onclick = handleSend;
    document.getElementById("messageInput").onkeydown = (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    };

    document.getElementById("loginBtn").onclick = () => {
      const email = document.getElementById("loginEmail").value;
      const pass = document.getElementById("loginPassword").value;
      signInWithEmailAndPassword(firebaseAuth, email, pass).catch(err => alert(err.message));
    };

    document.getElementById("logoutBtn").onclick = () => {
      signOut(firebaseAuth).then(() => {
        localStorage.removeItem("chat_backup");
        location.reload();
      });
    };

    document.getElementById("clearBtn").onclick = () => {
      if (confirm("Delete all saved links?")) {
        remove(ref(database, "messages"));
      }
    };
  });
</script>
</body>
</html>
